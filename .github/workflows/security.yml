name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1" # Every Monday at 6 AM

jobs:
  vulncheck:
    name: Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v7
        with:
          go-version: "1.24"
          cache: true

      - name: Run govulncheck
        run: |
          go run golang.org/x/vuln/cmd/govulncheck@v1.4.0 ./... 2>&1 | tee vulncheck-output.txt || true
          echo "::notice::govulncheck completed — review output above for any findings"

  gitleaks:
    name: Secret Detection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@v2
        with:
          config-path: .gitleaks.toml
