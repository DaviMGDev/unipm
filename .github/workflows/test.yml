name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  tier1:
    name: Tier 1 — Logic Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      - name: Run Tier 1 tests
        run: go test ./... -v -count=1 -coverprofile=coverage.out

      - name: Check coverage threshold
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | sed 's/%//')
          echo "Total coverage: ${COVERAGE}%"
          if [ -n "$COVERAGE" ] && [ "$(echo "$COVERAGE < 80" | bc)" = "1" ]; then
            echo "::warning::Coverage ${COVERAGE}% is below 80% threshold"
          fi

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out

  tier2:
    name: Tier 2 — Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      - name: Run Tier 2 integration tests
        run: go test -tags=integration ./... -v -count=1
