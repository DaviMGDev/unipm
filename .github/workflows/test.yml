name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  tier1:
    name: Tier 1 — Logic Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: "1.24"
          cache: true

      - name: Run Tier 1 tests
        run: go test ./... -v -count=1 -coverprofile=coverage.out

      - name: Check coverage threshold (pkg/ only)
        run: |
          # Compute coverage for pkg/ packages (exclude cmd/ which is CLI wiring).
          go test -coverprofile=pkg-coverage.out ./pkg/...
          echo "=== Per-package coverage ==="
          go tool cover -func=pkg-coverage.out | grep -v "total:" | grep "\.go:" | awk '{print $1, $3}' | sort
          echo ""
          COVERAGE=$(go tool cover -func=pkg-coverage.out | grep total | awk '{print $3}' | sed 's/%//')
          echo "Package coverage (pkg/): ${COVERAGE}%"
          if [ -n "$COVERAGE" ] && [ "$(echo "$COVERAGE < 50" | bc)" = "1" ]; then
            echo "::error::Package coverage ${COVERAGE}% is below 50% threshold"
            exit 1
          fi
          echo "::notice::Package coverage ${COVERAGE}% meets 50% threshold"

      - name: Check adapter package coverage
        run: |
          ADAPTER_COV=$(go tool cover -func=pkg-coverage.out | grep "github.com/DaviMGDev/unipm/pkg/adapter" | grep total | awk '{print $3}' | sed 's/%//')
          echo "Adapter package coverage: ${ADAPTER_COV}%"
          if [ -n "$ADAPTER_COV" ] && [ "$(echo "$ADAPTER_COV < 40" | bc)" = "1" ]; then
            echo "::error::Adapter package coverage ${ADAPTER_COV}% is below 40% threshold"
            exit 1
          fi
          echo "::notice::Adapter package coverage ${ADAPTER_COV}% meets 40% threshold"

      - name: Upload coverage
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage.out

  tier2:
    name: Tier 2 — Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: "1.24"
          cache: true

      - name: Run Tier 2 integration tests (with flaky retry)
        run: |
          # Retry up to 3 times to handle transient failures
          RETRY=0
          MAX_RETRIES=3
          while [ $RETRY -lt $MAX_RETRIES ]; do
            if go test -tags=integration ./... -v -count=1 2>&1 | tee integration-output.txt; then
              echo "::notice::Tier 2 tests passed on attempt $((RETRY + 1))"
              break
            fi
            RETRY=$((RETRY + 1))
            if [ $RETRY -lt $MAX_RETRIES ]; then
              echo "::warning::Tier 2 tests failed (attempt $RETRY of $MAX_RETRIES), retrying..."
              sleep 5
            else
              echo "::error::Tier 2 tests failed after $MAX_RETRIES attempts"
              exit 1
            fi
          done

      - name: Check skipped adapter count
        if: always()
        run: |
          SKIPPED=$(grep -c "SKIP:" integration-output.txt 2>/dev/null || echo "0")
          echo "Adapters skipped: ${SKIPPED}"

          # Count skips by adapter name
          echo "=== Skipped adapters ==="
          grep "SKIP:" integration-output.txt 2>/dev/null || echo "(none)"

          # Only flatpak and distrobox are allowed to skip in Docker
          # If >2 adapters skip, something is wrong
          if [ "${SKIPPED}" -gt 2 ]; then
            echo "::error::${SKIPPED} adapters skipped (max 2 allowed: flatpak + distrobox)"
            echo "::error::apt, npm, pypi, brew, and appimage must not skip in Docker"
            exit 1
          fi

          if [ "${SKIPPED}" -gt 0 ]; then
            echo "::warning::${SKIPPED} adapter(s) skipped — this is acceptable for flatpak/distrobox"
          else
            echo "::notice::All adapters available — no skips"
          fi
